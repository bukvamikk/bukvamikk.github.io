<head>

        :root {
            /* 1. Primary branding colors from screenshot */
            --border-color: #d1d9e0;
            /* Neutral grey-blue border */
            --primary-teal: #3b87a8;
            /* Dark teal from 'advanced search' header */
            --accent-teal: #21a1bb;
            /* Bright teal for active/special icons */

            /* 2. Text and Background variations */
            --text-secondary: #586069;
            --main-bg: #f6f8fa;
            /* Very light grey for main areas */
            --sidebar-bg: #ffffff;
            /* White sidebar for high contrast filters */
            --active-item-bg: #f1f8ff;
            /* Lightest blue for active/hover states */

            /* 3. Original structure variables (retained) */
            --header-height: 64px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #333;
            /* Changed from pure white to a light grey-blue base */
            background-color: var(--main-bg);
        }

        /* Update Header color from dark grey to primary teal */
        header {
            height: var(--header-height);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            /* Match the reference image header background */
            background: #455a64;
            z-index: 100;
            flex-shrink: 0;
        }

        .main-title{
            position: absolute;
            left: 24px;
            color: #fff;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .search-bar-wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Update input to match header context */
        .search-bar-dummy {
            width: 100%;
            padding: 10px 40px 10px 16px;
            border: 1px solid transparent;
            border-radius: 20px;
            font-size: 0.9rem;
            /* Slightly off-white for visibility on teal */
            background: #ffffffee;
            color: #333;
            outline: none;
        }

        /* Make the 'cancel' icon on header input clearer */
        .search-cancel-icon {
            position: absolute;
            right: 14px;
            color: #586069;
            font-size: 1.2rem;
            cursor: default;
            user-select: none;
        }

        .cancel-icon {
            position: absolute;
            right: 24px;
            color: #ffffff;
            font-size: 1.6rem;
            cursor: default;
            user-select: none;
        }


        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Make sidebar white, as in screenshot */
        #sidebar {
            width: 280px;
            padding: 20px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            background: var(--sidebar-bg);
            flex-shrink: 0;
        }

        .filter-group {
            margin-bottom: 24px;
            position: relative;
            transition: all 0.2s ease;
        }

        /* Update filter group titles to the primary teal */
        .filter-group h4 {
            margin: 0 0 10px 0;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            /* Change from neutral grey to primary teal */
            color: var(--primary-teal);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Match the accent teal for active group arrows */
        .filter-group:not(.collapsed) h4::after {
            color: var(--accent-teal);
        }

        .filter-group h4::after {
            content: '▾';
            font-size: 0.8rem;
            opacity: 0.8;
            transition: color 0.2s;
        }

        .filter-group.collapsed h4::after {
            content: '▸';
            color: var(--text-secondary);
        }

        .filter-group.collapsed .filter-options-container {
            display: none;
        }

        .filter-group.locked {
            opacity: 0.5;
        }

        .filter-group.locked h4 {
            cursor: not-allowed;
            border-bottom-color: transparent;
        }

        .filter-group.locked .filter-option {
            cursor: not-allowed;
            color: #999;
        }

        .sticky-search {
            position: sticky;
            top: 0;
            /* Match white sidebar bg */
            background: var(--sidebar-bg);
            padding-bottom: 8px;
            z-index: 2;
            margin-bottom: 4px;
        }

        .user-search-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.85rem;
            box-sizing: border-box;
            background: #fafafa;
            /* Subtle grey background for inputs */
        }

        .user-list-dropdown {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 4px;
        }

        .filter-option {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 2px 0;
            color: #333;
        }

        .filter-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;

        }

        .filter-option input {
            margin-right: 8px;
        }

        #main-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            /* Match the light grey-blue main background */
            background: var(--main-bg);
        }

        .content-padding {
            padding: 24px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .tab {
            padding: 16px 20px;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Use accent teal for active tabs and badges */
        .tab.active {
            border-bottom-color: var(--accent-teal);
            color: var(--accent-teal);
            font-weight: 600;
        }

        .badge {
            background: #eee;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7rem;
            color: #777;
            font-weight: bold;
        }

        .tab.active .badge {
            background: var(--accent-teal);
            color: #fff;
        }

        .result-section {
            margin-bottom: 40px;
        }

        .result-section h3 {
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 16px;
            /* Darken section titles slightly for contrast on main-bg */

        /* Use white for list items to contrast with the light main-bg */

            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            background: #fff;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .item-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .chip-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .chip {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            border: 1px solid var(--border-color);
            /* Standard light grey-blue background for chips */
            background: var(--main-bg);
            color: #333;
        }

        /* Special case for the "Work" chip to use primary-teal color */
        .chip.chip-work {
            color: var(--primary-teal);
            font-weight: 500;
        }

        .pills-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        /* Adapt pills to the new primary-teal and main-bg theme */
        .pill {
            display: inline-flex;
            background: #cfd8dc;
            border: 1px solid #ccd9ea;
            /* Use primary teal for pill text */
            color: #000;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            align-items: center;
        }

        .pill.disabled-pill {
            background: #f5f5f5;
            border-color: #ddd;
            color: #999;
            opacity: 0.7;
            pointer-events: none;
        }

        .pill.invalid {
            background: #ff0000;
            border-color: #ff0000;
            color: #fff;
            opacity: 0.7;
        }

        .pill span {
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .clear-btn-inline {
            background: none;
            border: none;
            /* Use accent teal for clarity on interactive links */
            color: var(--accent-teal);
            text-decoration: underline;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 4px 8px;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .direction-btn {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        .empty-state .emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }

        .filter-option.option-disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
            /* Prevents clicking the label */
        }

        .view-more-btn {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
    </style>
</head>

            if (activeFilters["Associated user"].length && !activeFilters["Associated user"].includes(item.associatedUser)) return false;
            if (activeFilters["Media types"].length && (!item.type || !activeFilters["Media types"].includes(item.type))) return false;
            if (activeFilters["Priorities"].length && (!item.priority || !activeFilters["Priorities"].includes(item.priority))) return false;
            if (activeFilters["Statuses"].length && (!item.state || !activeFilters["Statuses"].some(v => v.toLowerCase() === item.state.toLowerCase()))) return false;
            if (activeFilters["Portal states"].length && (!item.portalState || !activeFilters["Portal states"].includes(item.portalState))) return false;

            if (activeFilters["Last updated"].length) {
                const today = new Date("2026-03-16");
                const diffDays = (today - new Date(item.lastUpdated)) / (1000 * 60 * 60 * 24);
                const matchDate = activeFilters["Last updated"].some(f => {
                    if (f === "Today") return diffDays <= 1;
                    if (f === "This week") return diffDays <= 7;
                    if (f === "This month") return diffDays <= 30;
                    if (f === "This year") return diffDays <= 365;
                    return diffDays > 365;
                });
                if (!matchDate) return false;
            }
            return true;
        }

        function renderAll() { renderTabs(); renderSidebar(); renderPills(); renderResults(); }

        function renderTabs() {
            document.getElementById('tabs-root').innerHTML = CATEGORIES.map(cat => {
                const key = cat.toLowerCase().replace(" & ", "&");
                let count = 0;
                if (cat === "All") {
                    Object.keys(rawData).forEach(k => { count += rawData[k].filter(matchesFilters).length; });
                } else {
                    count = (rawData[key] || []).filter(matchesFilters).length;
                }
                return `<div class="tab ${cat === currentCategory ? 'active' : ''}" onclick="setCategory('${cat}')">
                    ${cat} <span class="badge">${count}</span>
                </div>`;
            }).join('');
        }

        function renderSidebar() {
            const root = document.getElementById('filter-groups-root');
            const allowedGroups = CATEGORY_MAP[currentCategory] || [];

            root.innerHTML = Object.keys(FILTER_STRUCTURE).map(group => {
                const isNotApplicable = !allowedGroups.includes(group);
                const isCollapsed = isNotApplicable || (collapsedState[group] === undefined ? false : collapsedState[group]);

                let options = FILTER_STRUCTURE[group];
                if (group === "Associated user") {
                    options = options.filter(opt => opt.toLowerCase().includes(userSearchTerm.toLowerCase()));
                }

                return `
                <div class="filter-group ${isCollapsed ? 'collapsed' : ''} ${isNotApplicable ? 'locked' : ''}">
                    <h4 onclick="toggleFilterGroup('${group}', ${isNotApplicable})">${group}</h4>
                    <div class="filter-options-container">
                        ${group === "Associated user" ? `<input type="text" class="user-search-input" oninput="handleUserSearch(this.value)" value="${userSearchTerm}" placeholder="Search for a user">` : ''}
                        <div class="${group === 'Associated user' ? 'user-list-dropdown' : ''}">
                            ${options.map(opt => {
                    let isDisabled = false;
                    if (group === "Domains" && currentCategory !== "All") {
                        const allowed = DOMAIN_RESTRICTIONS[currentCategory] || [];
                        if (!allowed.includes(opt)) isDisabled = true;
                    }
                    return `
                                <label class="filter-option ${isDisabled ? 'disabled' : ''}">
                                    <input type="checkbox" ${activeFilters[group].includes(opt) ? 'checked' : ''} ${isDisabled ? 'disabled' : ''} onchange="toggleFilter('${group}', '${opt}')"> 
                                    ${opt}
                                </label>`;
                }).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleFilterGroup(group, isLocked) {
            if (isLocked) return;
            collapsedState[group] = !collapsedState[group];
            renderSidebar();
        }

        function renderPills() {
            const container = document.getElementById('pills-container');
            const allowedGroups = CATEGORY_MAP[currentCategory] || [];
            const allowedDomains = DOMAIN_RESTRICTIONS[currentCategory] || [];
            let html = `<div class="pill">Keyword: Sisi <span onclick="alert('Fixed keyword')">✕</span></div>`;

            Object.entries(activeFilters).forEach(([group, values]) => {
                values.forEach(val => {
                    const isGroupInvalid = !allowedGroups.includes(group);
                    const isValueInvalid = group === "Domains" && currentCategory !== "All" && !allowedDomains.includes(val);
                    const isInvalid = isGroupInvalid || isValueInvalid;
                    html += `
                    <div class="pill ${isInvalid ? 'invalid' : ''}">
                        ${isInvalid ? '⚠️ ' : ''}${group}: ${val} 
                        <span onclick="toggleFilter('${group}', '${val}')">✕</span>
                    </div>`;
                });
            });

            if (Object.values(activeFilters).flat().length > -1) {
                html += `<button class="clear-btn-inline" onclick="clearAllFilters()">Clear All</button>`;
            }
            container.innerHTML = html;
        }

        function renderResults() {
            const root = document.getElementById('results-root');
            root.innerHTML = "";
            const cats = currentCategory === "All" ? CATEGORIES.slice(1) : [currentCategory];
            let totalFound = 0;

            cats.forEach(cat => {
                const key = cat.toLowerCase().replace(" & ", "&");
                let items = (rawData[key] || []).filter(matchesFilters);

                // Sort items
                items.sort((a, b) => {
                    let valA = currentSort === 'alphabetical' ? a.name.toLowerCase() : a[currentSort];
                    let valB = currentSort === 'alphabetical' ? b.name.toLowerCase() : b[currentSort];
                    let comparison = valA > valB ? 1 : (valA < valB ? -1 : 0);
                    return sortDirection === 'desc' ? comparison * -1 : comparison;
                });

                if (items.length > 0) {
                    totalFound += items.length;

                    // Logic for the "All" tab limit
                    const isAllTab = currentCategory === "All";
                    const needsLimit = isAllTab && items.length > 5;
                    const itemsToDisplay = needsLimit ? items.slice(0, 5) : items;

                    let sectionHtml = `
                <div class="result-section">
                    <h3>${cat} (${items.length})</h3>
                    ${itemsToDisplay.map(i => `
                        <div class="list-item">
                            <div class="item-name">${i.name}</div>
                            <div class="item-meta">
                                ${USER_LABEL_MAP[cat] || "User"} ${i.associatedUser} • 
                                Created: ${i.creationDate || 'N/A'} • 
                                Modified: ${i.lastUpdated}
                            </div>
                            <div class="chip-row">
                                <div class="chip" style="color:var(--primary-color)">${i.domain}</div>
                                ${i.type ? `<div class="chip">${mediaIcons[i.type]} ${i.type}</div>` : ''}
                                ${i.state ? `<div class="chip">${i.state}</div>` : ''}
                                ${i.priority ? `<div class="chip">Priority: ${i.priority}</div>` : ''}
                            </div>
                        </div>`).join('')}
                    
                    ${needsLimit ? `
                        <button class="view-more-btn" onclick="setCategory('${cat}')">
                            Show all ${items.length} ${cat} →
                        </button>
                    ` : ''}
                </div>`;

                    root.insertAdjacentHTML('beforeend', sectionHtml);
                }
            });

            if (totalFound === 0) {
                root.innerHTML = `<div class="empty-state"><span class="emoji">😢</span><p>No matches found.</p></div>`;
            }
        }

        function setCategory(c) { currentCategory = c; renderAll(); }
        function toggleFilter(g, v) {
            const i = activeFilters[g].indexOf(v);
            if (i > -1) activeFilters[g].splice(i, 1); else activeFilters[g].push(v);
            renderAll();
        }
        function handleUserSearch(v) { userSearchTerm = v; renderSidebar(); }
        function clearAllFilters() { Object.keys(activeFilters).forEach(k => activeFilters[k] = []); renderAll(); }

        // --- TOOLBAR EVENT LISTENERS ---
        document.getElementById('sort-select').addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderAll();
        });

        document.getElementById('direction-toggle').addEventListener('click', (e) => {
            sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
            e.target.innerText = sortDirection === 'desc' ? 'DESC ⬇' : 'ASC ⬆';
            renderAll();
        });

        renderAll();
    </script>
</body>

</html>
