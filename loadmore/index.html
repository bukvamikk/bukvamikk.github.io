<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Field Clickdummy</title>
    <style>
        :root {
            --bg-color: #009cd3;
            --surface-color: #ffffff;
            --border-color: #d1d5db;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --accent-blue: #0076a3;
            --hover-bg: #f3f4f6;
            --banner-bg: #f9fafb;
            --banner-border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .search-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        /* Search Bar Wrapper */
        .search-bar {
            background: var(--surface-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 20;
        }

        /* PURE CSS AUTOGROW DROPDOWN WRAPPER */
        .category-select-wrapper {
            position: relative;
            border-right: 1px solid var(--border-color);
            display: inline-grid; 
            align-items: center;
            flex-shrink: 0;
            min-width: 80px; 
        }

        /* Shared font and padding configurations */
        .category-dropdown-trigger,
        .dropdown-text-mirror {
            grid-area: 1 / 1; 
            font-size: 11px;
            font-weight: 400;
            white-space: nowrap;
            padding: 16px 32px 16px 16px; 
        }

        .category-dropdown-trigger {
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            border: none;
            outline: none;
            height: 100%;
            width: 100%;
            text-align: left;
            user-select: none;
            overflow: hidden;
        }

        /* Hidden mirror layout text box */
        .dropdown-text-mirror {
            visibility: hidden;
            pointer-events: none;
            display: inline-block;
        }

        /* Chevron down arrow */
        .category-select-wrapper::after {
            content: "";
            position: absolute;
            right: 14px; 
            top: 50%;
            transform: translateY(-50%);
            border: 4px solid transparent;
            border-top-color: var(--text-muted);
            pointer-events: none;
        }

        /* FLOATING CUSTOM DROPDOWN MENU */
        .custom-dropdown-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            background: var(--surface-color);
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.15);
            width: max-content;
            min-width: 180px; 
            padding: 6px 0;
            margin: 0;
            list-style: none;
            display: none; 
            z-index: 30; 
        }

        .custom-dropdown-menu.is-open {
            display: block;
        }

        .dropdown-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.15s;
            font-size: 11px;         
            font-weight: 400;        
            white-space: nowrap;     
            color: var(--text-main);
        }

        .dropdown-item:hover {
            background-color: var(--hover-bg);
        }

        .dropdown-item.is-selected {
            background-color: #eaedf1;
            font-weight: 500; 
        }

        /* Input Field Wrapper */
        .search-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
        }

        .search-input {
            width: 100%;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 16px 32px 16px 0;
            font-size: 13px;
        }

        /* Action Icon (Search/Clear Button) */
        .search-action-btn {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border-radius: 50%;
            transition: background-color 0.2s, color 0.2s;
        }

        .search-action-btn.is-clear {
            color: #111827;
        }
        .search-action-btn.is-clear:hover {
            background-color: var(--hover-bg);
        }

        /* Results Container */
        .results-box {
            background: var(--surface-color);
            border-radius: 8px;
            margin-top: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 650px;
            overflow-y: auto;
            padding: 16px;
            display: none;
            position: relative;
            z-index: 10;
        }

        /* Section Styling */
        .category-section {
            margin-bottom: 24px;
        }
        
        .category-section:last-child {
            margin-bottom: 0;
        }

        .category-header {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            padding-bottom: 8px;
            border-bottom: 1px solid #edf2f7;
            margin-bottom: 12px;
        }

        /* Items list */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--surface-color);
            border: 1px solid #f3f4f6;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .result-item:hover {
            background: var(--hover-bg);
        }

        .item-icon {
            width: 36px;
            height: 36px;
            background: #e0f2fe;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            color: #0369a1;
            font-weight: bold;
            font-size: 18px;
        }

        .item-name {
            font-size: 15px;
            color: var(--text-main);
            flex: 1;
        }

        /* Load More Link */
        .load-more-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }

        .load-more-link:hover {
            text-decoration: underline;
        }

        /* Info Banner */
        .info-banner {
            margin-top: 16px;
            padding: 12px 16px;
            background-color: var(--banner-bg);
            border: 1px solid var(--banner-border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .info-banner a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .info-banner a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-bar">
            <div class="category-select-wrapper">
                <span class="dropdown-text-mirror" id="dropdownMirror">All</span>
                <button type="button" class="category-dropdown-trigger" id="dropdownTriggerBtn">All</button>
            </div>
            
            <ul class="custom-dropdown-menu" id="customDropdownMenu">
                <li class="dropdown-item is-selected" data-value="all">All</li>
                <li class="dropdown-item" data-value="assets">Assets</li>
                <li class="dropdown-item" data-value="collections">Collections & Folders</li>
                <li class="dropdown-item" data-value="templates">Content Templates</li>
                <li class="dropdown-item" data-value="libraries">Libraries</li>
                <li class="dropdown-item" data-value="portals">Portals</li>
                <li class="dropdown-item" data-value="tasks">Tasks</li>
                <li class="dropdown-item" data-value="workrooms">Workrooms</li>
            </ul>

            <div class="search-input-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="Search for anything">
                <button type="button" class="search-action-btn" id="searchActionBtn" aria-label="Search">
                    <svg id="actionIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <div class="results-box" id="resultsBox"></div>
    </div>

    <script>
        const mockDatabase = {
            assets: { title: "Assets", total: 40, icon: "📁" },
            collections: { title: "Collections & Folders", total: 25, icon: "📂" },
            templates: { title: "Content Templates", total: 8, icon: "📄" },
            libraries: { title: "Libraries", total: 12, icon: "📚" },
            portals: { title: "Portals", total: 4, icon: "🌐" },
            tasks: { title: "Tasks", total: 3, icon: "☑️" },
            workrooms: { title: "Workrooms", total: 8, icon: "👥" }
        };

        const searchInput = document.getElementById('searchInput');
        const dropdownTriggerBtn = document.getElementById('dropdownTriggerBtn');
        const dropdownMirror = document.getElementById('dropdownMirror');
        const customDropdownMenu = document.getElementById('customDropdownMenu');
        const dropdownItems = document.querySelectorAll('.dropdown-item');
        constresultsBox = document.getElementById('resultsBox');
        const searchActionBtn = document.getElementById('searchActionBtn');
        const actionIcon = document.getElementById('actionIcon');

        const searchSvg = `<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>`;
        const clearSvg = `<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>`;

        let currentSelection = 'all';
        let expandedCategories = {};

        // Toggle custom menu on click
        dropdownTriggerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            customDropdownMenu.classList.toggle('is-open');
        });

        // Close custom menu if user clicks anywhere outside
        window.addEventListener('click', () => {
            customDropdownMenu.classList.remove('is-open');
        });

        // Custom Item Selection Logic
        dropdownItems.forEach(item => {
            item.addEventListener('click', () => {
                document.querySelector('.dropdown-item.is-selected').classList.remove('is-selected');
                item.classList.add('is-selected');
                currentSelection = item.getAttribute('data-value');
                
                dropdownTriggerBtn.innerText = item.innerText;
                dropdownMirror.innerText = item.innerText;
                
                expandedCategories = {}; 
                renderSearch();          
            });
        });

        searchInput.addEventListener('input', () => {
            updateIconState();
            renderSearch();
        });

        searchActionBtn.addEventListener('click', () => {
            if (searchActionBtn.classList.contains('is-clear')) {
                clearSearchField();
            }
        });

        function updateIconState() {
            if (searchInput.value.trim().length > 0) {
                searchActionBtn.classList.add('is-clear');
                searchActionBtn.setAttribute('aria-label', 'Clear search');
                actionIcon.innerHTML = clearSvg;
            } else {
                searchActionBtn.classList.remove('is-clear');
                searchActionBtn.setAttribute('aria-label', 'Search');
                actionIcon.innerHTML = searchSvg;
            }
        }

        function clearSearchField() {
            searchInput.value = '';
            expandedCategories = {};
            updateIconState();
            renderSearch();
            searchInput.focus();
        }

        function renderSearch() {
            const query = searchInput.value.trim();

            if (query === '') {
                resultsBox.style.display = 'none';
                resultsBox.innerHTML = '';
                return;
            }

            resultsBox.style.display = 'block';
            resultsBox.innerHTML = '';

            if (currentSelection === 'all') {
                renderAllView();
            } else {
                renderSingleCategoryView(currentSelection);
            }
        }

        function renderAllView() {
            Object.keys(mockDatabase).forEach(key => {
                const category = mockDatabase[key];
                const section = document.createElement('div');
                section.className = 'category-section';

                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerText = `${category.title} (${category.total})`;
                section.appendChild(header);

                const isExpanded = expandedCategories[key];
                const itemsToShow = isExpanded ? 10 : 5;
                const activeLimit = Math.min(category.total, itemsToShow);

                const listContainer = document.createElement('div');
                listContainer.className = 'items-list';

                for (let i = 0; i < activeLimit; i++) {
                    listContainer.appendChild(createResultItem(category.icon, `Result item ${i + 1} for category`));
                }
                section.appendChild(listContainer);

                if (category.total > 5) {
                    if (!isExpanded) {
                        const loadMore = document.createElement('a');
                        loadMore.className = 'load-more-link';
                        loadMore.innerText = '↓ Load More';
                        loadMore.onclick = () => {
                            expandedCategories[key] = true;
                            renderSearch();
                        };
                        section.appendChild(loadMore);
                    } else {
                        const remaining = category.total - 10;
                        if (remaining > 0) {
                            section.appendChild(createInfoBanner(remaining));
                        }
                    }
                }
                resultsBox.appendChild(section);
            });
        }

        function renderSingleCategoryView(categoryKey) {
            const category = mockDatabase[categoryKey];
            if (!category) return;

            const section = document.createElement('div');
            section.className = 'category-section';

            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerText = `${category.title} (${category.total})`;
            section.appendChild(header);

            const listContainer = document.createElement('div');
            listContainer.className = 'items-list';

            const itemsToShow = Math.min(category.total, 25);

            for (let i = 0; i < itemsToShow; i++) {
                listContainer.appendChild(createResultItem(category.icon, `Result item ${i + 1} from specialized search`));
            }
            section.appendChild(listContainer);

            const remaining = category.total - itemsToShow;
            if (remaining > 0) {
                section.appendChild(createInfoBanner(remaining));
            }

            resultsBox.appendChild(section);
        }

        function createResultItem(icon, text) {
            const item = document.createElement('div');
            item.className = 'result-item';
            
            const iconSpan = document.createElement('span');
            iconSpan.className = 'item-icon';
            iconSpan.innerText = icon;

            const nameSpan = document.createElement('span');
            nameSpan.className = 'item-name';
            nameSpan.innerText = text;

            item.appendChild(iconSpan);
            item.appendChild(nameSpan);
            return item;
        }

        /* FIXED: Modern updated text structure string based on specs */
        function createInfoBanner(left) {
            const banner = document.createElement('div');
            banner.className = 'info-banner';
            
            // Handles result vs results pluralization dynamically
            const resultWord = left === 1 ? 'result' : 'results';
            
            banner.innerHTML = `${left} more search ${resultWord}. Try a more specific search.`;
            return banner;
        }
    </script>
</body>
</html>
